name: CI — Alpine Homestay Jakhol

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Type-check & Lint ──────────────────────────────────────────────────
  quality:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: TypeScript check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  # ── 2. Build ─────────────────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 12

    env:
      NEXT_PUBLIC_SITE_URL: https://www.thealpinehomestay.in
      NEXT_PUBLIC_GA_ID: ${{ secrets.GA_ID }}
      NEXT_PUBLIC_FORMSPREE_ID: ${{ secrets.FORMSPREE_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci --prefer-offline

      - name: Build
        run: npm run build

      - name: Validate build output
        run: |
          test -d .next && echo "✅ .next/ exists"
          echo "Build size:"
          du -sh .next/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 3

  # ── 3. Lighthouse audit (PR only) ─────────────────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci --prefer-offline

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Start server & run Lighthouse
        run: |
          npm run start &
          sleep 5
          npx lighthouse http://localhost:3000 \
            --output json \
            --output-path ./lh-report.json \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --only-categories=performance,accessibility,best-practices,seo \
            --quiet || true

      - name: Print scores
        run: |
          node -e "
            try {
              const r = require('./lh-report.json');
              const c = r.categories;
              const score = k => Math.round((c[k]?.score ?? 0) * 100);
              const check = n => n >= 90 ? '✅' : n >= 70 ? '⚠️' : '❌';
              const p = score('performance');
              const a = score('accessibility');
              const b = score('best-practices');
              const s = score('seo');
              console.log('=== Lighthouse Scores ===');
              console.log(\`\${check(p)} Performance:     \${p}\`);
              console.log(\`\${check(a)} Accessibility:   \${a}\`);
              console.log(\`\${check(b)} Best Practices:  \${b}\`);
              console.log(\`\${check(s)} SEO:             \${s}\`);
              if (p < 70) process.exit(1);
            } catch(e) { console.log('Lighthouse report not available'); }
          "

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: lh-report.json
          retention-days: 7

  # ── 4. Deploy confirmation ────────────────────────────────────────────────
  deploy-ready:
    name: Deploy Ready ✅
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Confirm
        run: |
          echo "✅ Build passed on main branch."
          echo "   Vercel auto-deploys via GitHub integration."
          echo "   Check: https://vercel.com/dashboard"
